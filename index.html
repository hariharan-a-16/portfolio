<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hariharan Portfolio</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <!-- Custom Cursor Removed -->

    <!-- Scroll Progress -->
    <div class="scroll-progress" id="scroll-progress"></div>

    <!-- Header & Navigation -->
    <header class="header" id="header">
        <nav class="navbar container">
            <a href="#home" class="logo">Portfolio.</a>
            <div class="nav-menu" id="nav-menu">
                <ul class="nav-list" id="dynamic-nav">
                    <!-- Nav items injected here -->
                </ul>
            </div>
            <div class="nav-toggle" id="nav-toggle" role="button" aria-label="Toggle navigation menu" tabindex="0">
                <i class="fa-solid fa-bars"></i>
            </div>
        </nav>
    </header>

    <main>
        <!-- Hero Section -->
        <section class="hero section" id="home">
            <div id="particles-container" class="particles-bg"></div>
            <div class="hero-container container grid" id="dynamic-hero">
                <!-- Hero content injected here -->
            </div>
        </section>

        <!-- About Section -->
        <section class="about section" id="about">
            <h2 class="section-title reveal">About Me</h2>
            <div class="about-container container grid" id="dynamic-about">
                <!-- About content injected here -->
            </div>
        </section>

        <!-- Skills Section -->
        <section class="skills section" id="skills">
            <h2 class="section-title reveal">My Skills</h2>
            <div class="skills-container container" id="dynamic-skills">
                <!-- Skills content injected here -->
            </div>
        </section>

        <!-- Experience Section -->
        <section class="experience section" id="experience">
            <h2 class="section-title reveal">Experience</h2>
            <div class="experience-container container" id="dynamic-experience">
                <!-- Experience timeline injected here -->
            </div>
        </section>

        <!-- Projects Section -->
        <section class="projects section" id="projects">
            <h2 class="section-title reveal">Projects</h2>
            <div class="projects-container container grid" id="dynamic-projects">
                <!-- Projects injected here -->
            </div>
        </section>

        <!-- Services Section -->
        <section class="services section" id="services">
            <h2 class="section-title reveal">Services</h2>
            <div class="services-container container grid" id="dynamic-services">
                <!-- Services injected here -->
            </div>
        </section>

        <!-- Achievements Section -->
        <section class="achievements section" id="achievements">
            <h2 class="section-title reveal">Achievements</h2>
            <div class="achievements-container container grid" id="dynamic-achievements">
                <!-- Achievements injected here -->
            </div>
        </section>

        <!-- Contact Section -->
        <section class="contact section" id="contact">
            <h2 class="section-title reveal">Contact Me</h2>
            <div class="contact-container container grid" id="dynamic-contact">
                <!-- Contact content injected here -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer" id="dynamic-footer">
        <!-- Footer content injected here -->
    </footer>

    <!-- Back to top button -->
    <a href="#home" class="back-to-top" id="back-to-top" aria-label="Scroll back to top">
        <i class="fa-solid fa-arrow-up"></i>
    </a>

    <!-- Scripts -->
    <script src="static/js/data.js"></script>
    <script src="static/js/script.js"></script>
</body>
</html>
